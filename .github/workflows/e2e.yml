name: E2E (deterministic)

# Layer 1 of the testing team: scripted Playwright flows against the TEST Supabase
# project. Runs on every PR and on pushes to main. The agentic missions (Layer 2)
# are run on demand / on a schedule, not here.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   E2E_SUPABASE_URL                 test project URL
#   E2E_SUPABASE_ANON_KEY            test project anon (public) key
#   E2E_SUPABASE_SERVICE_ROLE_KEY    test project service-role key
# These MUST point at a throwaway test project, never production.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_BASE_URL: http://localhost:3000
      E2E_EMAIL_DOMAIN: e2e.treno.test
    steps:
      - uses: actions/checkout@v4

      - name: Skip if E2E secrets are not configured
        id: guard
        run: |
          if [ -z "${E2E_SUPABASE_URL}" ]; then
            echo "E2E secrets not set — skipping. Add them in repo settings to enable."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: npm ci

      - name: Build shared package
        if: steps.guard.outputs.run == 'true'
        run: npm run build -w packages/shared --if-present

      - name: Install Playwright browser
        if: steps.guard.outputs.run == 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        if: steps.guard.outputs.run == 'true'
        run: npx playwright test
        working-directory: apps/web

      - name: Upload Playwright report
        if: ${{ steps.guard.outputs.run == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14
